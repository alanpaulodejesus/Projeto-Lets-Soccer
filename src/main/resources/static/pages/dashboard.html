<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .header {
            background: #1e4fa3;
            color: white;
            padding: 20px;
        }

        .logout-btn {
            position: absolute;
            left: 20px;
            top: 20px;
        }
    </style>

</head>

<body>

<div class="header center">
    <h4>⚽ Lets Soccer</h4>

    <button class="btn red logout-btn" onclick="logout()">
        Sair
    </button>
</div>

<div class="container">

    <div id="clubeSelecionado"></div>

</div>

<div class="container">

    <div class="row" id="listaTimes">
        <h5>Bem-vindo!</h5>
        <p>Sua paixão pelo seu time!</p>
        <p id="textoEscolha">Escolha seu time:</p>
        <!-- Cruzeiro -->
        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(1)" style="cursor:pointer">
                <div class="card-content" id="card-cruzeiro">
                    <img src="/img/cruzeiro.svg" width="190">
                    <p><strong class="blue-text text-darken-2">Cruzeiro</strong></p>
                </div>
            </div>
        </div>

        <!-- Atlético -->
        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(2)" style="cursor:pointer">
                <div class="card-content" id="card-atleticomg">
                    <img src="/img/atletico-mineiro.svg" width="190">
                    <p><strong>Atlético</strong></p>
                </div>
            </div>
        </div>

    </div>

    <div id="mensagem"></div>

</div>

<script src="/js/dashboard.js"></script>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href="/";
}
</script>

</body>
</html>
