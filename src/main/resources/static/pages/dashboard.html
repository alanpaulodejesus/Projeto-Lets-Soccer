<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lets Soccer</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <style>

body{
background:#f5f5f5;
overflow:auto;
}

.header{
background:#1e4fa3;
color:white;
padding:20px;
position:relative;
}

.logout-btn{
position:absolute;
left:20px;
top:20px;
}

/* CAMPO */
#campoFutebol{
position:relative;
width:100%;
max-width:500px;
aspect-ratio:3/4;
margin:0 auto;
background:linear-gradient(#2e7d32,#1b5e20);
border-radius:15px;
overflow:hidden;
}

#campoFutebol:before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:url('/img/campo-linhas.png');
background-size:cover;
opacity:0.3;
}

.posicao{
position:absolute;
transform:translate(-50%,-50%);
text-align:center;
width:80px;
cursor:pointer;
}

.jogador-circle{
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:9px;
font-weight:bold;
margin:auto;
border:3px solid #2196f3;
}

.posicao.ocupada .jogador-circle{
border-color:#ffeb3b;
}

.jogador-nome{
font-size:9px;
color:white;
margin-top:4px;
text-shadow:1px 1px 2px black;
}

#mensagemJogadores{
text-align:center;
color:red;
}

.modal{
width:80% !important;
height:90vh !important;
max-height:90vh !important;
display:flex;
flex-direction:column;
}

.modal-content{
flex:1;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.modal-footer{
background:white;
flex-shrink:0;
}

/* NOVO MODAL SELEÇÃO */
#listaJogadores{
width:100%;
max-height:300px;
overflow:auto;
}

.jogador-option{
padding:14px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.jogador-option:hover{
background:#f1f1f1;
}

</style>
</head>

<body>

<div class="header center">
    <h4>⚽ Lets Soccer</h4>
    <button class="btn red logout-btn" onclick="logout()">Sair</button>
</div>

<div class="container">
    <div id="clubeSelecionado"></div>
</div>

<div class="container">

    <div class="row" id="listaTimes">

        <h5>Bem-vindo!</h5>
        <p id="textoEscolha">Escolha seu time:</p>

        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(1)">
                <div class="card-content">
                    <img src="/img/cruzeiro.svg" width="190">
                    <p><strong>Cruzeiro</strong></p>
                </div>
            </div>
        </div>

        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(2)">
                <div class="card-content">
                    <img src="/img/atletico-mineiro.svg" width="190">
                    <p><strong>Atlético</strong></p>
                </div>
            </div>
        </div>

    </div>

    <div class="center" style="margin-top:20px">
        <a id="btnEsquema"
           class="btn modal-trigger green"
           href="#modalEsquema">
            Escolher Esquema Tático
        </a>
    </div>

    <div id="mensagem"></div>

</div>


<!-- MODAL ESQUEMA -->

<div id="modalEsquema" class="modal">

    <div class="modal-content">

        <h5>Escolha o esquema</h5>
        <div id="mensagemModal"></div>

        <p>
            <label>
                <input name="esquema" type="radio" value="442">
                <span>4-4-2</span>
            </label>
        </p>

        <p>
            <label>
                <input name="esquema" type="radio" value="352">
                <span>3-5-2</span>
            </label>
        </p>

        <p>
            <label>
                <input name="esquema" type="radio" value="541">
                <span>5-4-1</span>
            </label>
        </p>

        <p>
            <label>
                <input name="esquema" type="radio" value="244">
                <span>2-4-4</span>
            </label>
        </p>

    </div>

    <div class="modal-footer">
        <a href="#!" class="modal-close btn red">Voltar</a>
        <a href="#!" class="btn green" onclick="salvarEsquema()">Confirmar</a>
    </div>

</div>


<!-- MODAL ESCALAÇÃO -->

<div id="modalJogadores" class="modal">

    <div class="modal-content">
        <h5>Escolha sua escalação</h5>

        <div id="campoFutebol"></div>

        <p id="mensagemJogadores"></p>

    </div>

    <div class="modal-footer">
        <a href="#!" class="modal-close btn red">
            Cancelar
        </a>

        <a href="#!"
           class="btn green"
           onclick="confirmarJogadores()">
            Confirmar
        </a>

    </div>

</div>


<!-- NOVO MODAL ESCOLHER ATLETA -->

<div id="modalSelecaoJogador" class="modal">

    <div class="modal-content">

        <h5>Escolha o Jogador</h5>

        <div id="listaJogadores"></div>

    </div>

    <div class="modal-footer">
        <a href="#!" class="modal-close btn red">
            Fechar
        </a>
    </div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/js/dashboard.js"></script>

<script>
function logout(){
localStorage.removeItem("token");
window.location.href="/";
}
</script>

</body>
</html>
