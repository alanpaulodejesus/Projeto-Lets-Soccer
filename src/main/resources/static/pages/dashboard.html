<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <style>
    body { background: #f5f5f5; }

    .header { background: #1e4fa3; color: white; padding: 20px; position: relative; }
    .logout-btn { position: absolute; left: 20px; top: 20px; }

    #campoFutebol {
        position: relative;
        width: 100%;
        max-width: 600px;
        aspect-ratio: 3/2;
        margin: 20px auto;
        background-image: url('/img/campo.svg');
        background-size: cover;
        background-position: center;
        border: 2px solid #fff;
        border-radius: 10px;
    }

    .posicao {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255,235,59,0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        cursor: pointer;
        border: 2px solid transparent;
        font-size: 12px;
        text-align: center;
    }

    .posicao.selecionada { border-color: red; }

    #mensagemJogadores { text-align:center; color:red; margin-top:10px; }
</style>
</head>
<body>

<div class="header center">
    <h4>⚽ Lets Soccer</h4>
    <button class="btn red logout-btn" onclick="logout()">Sair</button>
</div>

<div class="container">
    <div id="clubeSelecionado"></div>
</div>

<div class="container">
    <div class="row" id="listaTimes">
        <h5>Bem-vindo!</h5>
        <p>Sua paixão pelo seu time!</p>
        <p id="textoEscolha">Escolha seu time:</p>

        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(1)">
                <div class="card-content" id="card-cruzeiro">
                    <img src="/img/cruzeiro.svg" width="190">
                    <p><strong class="blue-text text-darken-2">Cruzeiro</strong></p>
                </div>
            </div>
        </div>

        <div class="col s6">
            <div class="card hoverable center" onclick="selecionarClube(2)">
                <div class="card-content" id="card-atleticomg">
                    <img src="/img/atletico-mineiro.svg" width="190">
                    <p><strong>Atlético</strong></p>
                </div>
            </div>
        </div>
    </div>

    <div class="center" style="margin-top:20px;">
        <a id="btnEsquema" class="btn modal-trigger green" href="#modalEsquema">Escolher Esquema Tático</a>
    </div>

    <div id="mensagem"></div>
</div>

<!-- Modal escolha esquema -->
<div id="modalEsquema" class="modal">
    <div class="modal-content">
        <h5>Escolha o esquema tático</h5>
        <div id="mensagemModal"></div>
        <p><label><input name="esquema" type="radio" value="442" /> <span>4-4-2</span></label></p>
        <p><label><input name="esquema" type="radio" value="352" /> <span>3-5-2</span></label></p>
        <p><label><input name="esquema" type="radio" value="541" /> <span>5-4-1</span></label></p>
        <p><label><input name="esquema" type="radio" value="244" /> <span>2-4-4</span></label></p>
    </div>
    <div class="modal-footer">
        <a href="#!" class="modal-close btn red">Voltar</a>
        <a href="#!" class="btn green" onclick="salvarEsquema()">Confirmar</a>
    </div>
</div>

<!-- Modal escalação -->
<div id="modalJogadores" class="modal">
    <div class="modal-content">
        <h5>Escolha seus jogadores</h5>
        <div id="campoFutebol"></div>
        <p id="mensagemJogadores"></p>
    </div>
    <div class="modal-footer">
        <a href="#!" class="modal-close btn red">Cancelar</a>
        <a href="#!" class="btn green" onclick="confirmarJogadores()">Confirmar</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/js/dashboard.js"></script>
<script>
function logout(){ localStorage.removeItem("token"); window.location.href="/"; }
</script>
</body>
</html>
