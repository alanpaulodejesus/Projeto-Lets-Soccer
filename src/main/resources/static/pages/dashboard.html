<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <style>

body{
background:#f5f5f5;
}

.header{
background:#1e4fa3;
color:white;
padding:20px;
}

.logout-btn{
position:absolute;
left:20px;
top:20px;
}

</style>

</head>

<body>

<div class="header center">

    <h4>⚽ Lets Soccer</h4>

    <button class="btn red logout-btn" onclick="logout()">
        Sair
    </button>

</div>

<div class="container">

    <h5>Bem-vindo!</h5>
    <p>Sua paixão pelo seu time!</p>

</div>

<script>

function logout(){

localStorage.removeItem("token");
window.location.href="/";

}

</script>

</body>
</html>
