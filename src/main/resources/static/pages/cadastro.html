<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Cadastro - Lets Soccer</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>

body{
background:#0d47a1;
}

.logo{
font-size:40px;
font-weight:bold;
color:white;
margin-top:60px;
}

.logo span{
color:#4caf50;
}

.password-container{
position:relative;
}

.password-toggle{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:20px;
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus{
-webkit-box-shadow:0 0 0px 1000px white inset !important;
transition:background-color 5000s ease-in-out 0s;
}

</style>

</head>

<body>

<div class="container">

    <div class="center logo">
        ⚽ Lets <span>Soccer!</span>
    </div>

    <div class="row">

        <div class="col s12 m6 offset-m3">

            <div class="card">

                <div class="card-content">

                    <span class="card-title center">Criar conta</span>

                    <form id="cadastroForm" autocomplete="off">

                        <input type="text" style="display:none">
                        <input type="password" style="display:none">

                        <div class="input-field">
                            <input id="nome" type="text" autocomplete="off" required>
                            <label for="nome">Nome</label>
                        </div>

                        <div class="input-field">
                            <input id="email" type="email" autocomplete="new-email" required>
                            <label for="email">Email</label>
                        </div>

                        <div class="input-field password-container">

                            <input id="senha" type="password" autocomplete="new-password" required>
                            <label for="senha">Senha</label>

                            <span id="toggleSenha" class="password-toggle">👁</span>

                        </div>

                        <div class="input-field password-container">

                            <input id="confirmacaoSenha" type="password" autocomplete="new-password" required>
                            <label for="confirmacaoSenha">Confirmar senha</label>

                            <span id="toggleConfirmarSenha" class="password-toggle">👁</span>

                        </div>

                        <div class="center">
                            <button class="btn green waves-effect waves-light">
                                Cadastrar
                            </button>
                        </div>

                    </form>

                </div>

            </div>

            <div id="mensagem"></div>

        </div>

    </div>

</div>

<script src="/js/cadastro.js"></script>

</body>
</html>
